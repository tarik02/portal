name: release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: run the release workflow in dry-run mode
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - master

env:
  CI_YARN_CACHE_DIR: ~/.cache/yarn/berry

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  dry-run:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: enable corepack
        run: corepack enable

      - name: restore yarn package store
        uses: actions/cache@v4
        with:
          path: ${{ env.CI_YARN_CACHE_DIR }}
          key: ${{ runner.os }}-yarn-store-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json', 'packages/*/package.json', 'yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: install dependencies
        run: yarn install --immutable

      - name: dry-run publish packages
        run: yarn release:dry-run

  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: enable corepack
        run: corepack enable

      - name: restore yarn package store
        uses: actions/cache@v4
        with:
          path: ${{ env.CI_YARN_CACHE_DIR }}
          key: ${{ runner.os }}-yarn-store-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json', 'packages/*/package.json', 'yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: install dependencies
        run: yarn install --immutable

      - name: setup npm auth
        run: |
          yarn config set npmAuthToken "${NODE_AUTH_TOKEN}" --home
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: setup git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: create release pr or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn version-packages
          publish: yarn release
          commit: version packages
          title: version packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
