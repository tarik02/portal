name: release

on:
  workflow_dispatch:

env:
  YARN_CACHE_DIR: ~/.cache/yarn/berry

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: enable corepack
        run: corepack enable

      - name: restore yarn package store
        uses: actions/cache@v4
        with:
          path: ${{ env.YARN_CACHE_DIR }}
          key: ${{ runner.os }}-yarn-store-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json', 'packages/*/package.json', 'yarn.lock', '.yarnrc.yml', 'mise.toml') }}

      - name: install dependencies
        run: yarn install --immutable

      - name: setup yarn npm token
        run: yarn config set npmAuthToken "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: release
        run: yarn release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YARN_NPM_CONFIG_PROVENANCE: true
